name: roadguard
description: RoadGuard Flutter application foundation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  hive: ^2.2.3
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  sensors_plus: ^6.1.0
  tflite_flutter: ^0.11.0
  vibration: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
